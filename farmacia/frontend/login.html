<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso al Sistema - Farmacia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="login.css">
</head>

<body>

  <div class="login-wrapper fade-in">

    <div class="login-card slide-up">

      <div class="logo-area">
        <img src="https://cdn-icons-png.flaticon.com/512/2965/2965567.png" alt="Farmacia" class="logo">
        <h2>Sistema de Inventario</h2>
        <p class="subtitle">Farmacia Berti</p>
      </div>

      <form id="form-login">

        <div class="form-group">
          <label>Usuario</label>
          <input type="text" id="login-usuario" placeholder="Ingrese su usuario" required>
        </div>

        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="login-pass" placeholder="Ingrese su contraseña" required>
        </div>

        <button type="submit" class="btn-primary">Ingresar</button>

      </form>

      <p class="footer-text">© 2026 Farmacia Berti — Sistema de Gestión</p>

    </div>

  </div>

<script src="login.js"></script>

</body>
</html>
